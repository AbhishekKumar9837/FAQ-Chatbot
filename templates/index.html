<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ Chatbot — Tech Support AI</title>
  <meta name="description" content="AI-powered FAQ Chatbot for Technology & Software Products. Get instant answers using NLP-driven similarity matching." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

<!-- ===== APP SHELL ===== -->
<div class="app-shell" id="appShell">

  <!-- ===== SIDEBAR — FAQ MANAGEMENT ===== -->
  <aside class="sidebar" id="sidebar" aria-label="FAQ Management Panel">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <span class="sidebar-logo-icon">🗂️</span>
        <span class="sidebar-logo-text">FAQ Manager</span>
      </div>
      <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close FAQ panel">✕</button>
    </div>

    <!-- Search FAQs -->
    <div class="sidebar-search-wrap">
      <input
        type="search"
        id="faqSearchInput"
        class="sidebar-search"
        placeholder="Search FAQs…"
        aria-label="Search FAQs"
      />
    </div>

    <!-- Category Filter -->
    <div class="category-filter" id="categoryFilter" role="group" aria-label="Filter by category">
      <button class="cat-chip active" data-cat="all">All</button>
    </div>

    <!-- FAQ List -->
    <div class="faq-list" id="faqList" aria-live="polite">
      <div class="faq-loading">Loading FAQs…</div>
    </div>

    <!-- Add FAQ Form -->
    <div class="add-faq-section">
      <button class="add-faq-toggle" id="addFaqToggle" aria-expanded="false">
        <span>➕</span> Add New FAQ
      </button>
      <div class="add-faq-form" id="addFaqForm" aria-hidden="true">
        <input type="text" id="newQuestion" class="faq-input" placeholder="Question…" />
        <textarea id="newAnswer" class="faq-input" rows="3" placeholder="Answer…"></textarea>
        <input type="text" id="newCategory" class="faq-input" placeholder="Category (e.g. Billing)" />
        <button class="btn-primary" id="submitFaqBtn">Save FAQ</button>
        <p class="faq-form-msg" id="faqFormMsg" aria-live="polite"></p>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN CHAT AREA ===== -->
  <main class="chat-main" id="chatMain">

    <!-- ── Top Navigation Bar ── -->
    <nav class="topbar" aria-label="Application toolbar">
      <div class="topbar-left">
        <button class="sidebar-toggle-btn" id="sidebarToggleBtn" aria-label="Toggle FAQ panel" title="FAQ Manager">
          <span class="hamburger-icon">☰</span>
        </button>
        <div class="brand">
          <div class="brand-avatar">🤖</div>
          <div class="brand-info">
            <h1 class="brand-name">TechBot</h1>
            <span class="brand-status" id="brandStatus">
              <span class="status-dot"></span> Online · NLP Powered
            </span>
          </div>
        </div>
      </div>
      <div class="topbar-right">
        <!-- TTS Toggle -->
        <button class="icon-btn" id="ttsToggleBtn" title="Toggle Text-to-Speech" aria-label="Toggle text to speech" aria-pressed="false">
          🔊
        </button>
        <!-- Export History -->
        <button class="icon-btn" id="exportBtn" title="Export conversation" aria-label="Export conversation history">
          📥
        </button>
        <!-- Clear Chat -->
        <button class="icon-btn" id="clearChatBtn" title="Clear conversation" aria-label="Clear conversation">
          🗑️
        </button>
        <!-- Dark / Light Mode Toggle -->
        <button class="icon-btn theme-toggle" id="themeToggleBtn" title="Toggle dark/light mode" aria-label="Toggle theme" aria-pressed="true">
          🌙
        </button>
      </div>
    </nav>

    <!-- ── Welcome Banner (shown until first message) ── -->
    <div class="welcome-banner" id="welcomeBanner">
      <div class="welcome-glow"></div>
      <div class="welcome-content">
        <div class="welcome-icon">🤖</div>
        <h2 class="welcome-title">Hi! I'm TechBot</h2>
        <p class="welcome-subtitle">Ask me anything about your software product — passwords, billing, installation, and more.</p>
        <div class="suggestion-chips" id="suggestionChips">
          <button class="chip" data-query="How do I reset my password?">🔑 Reset password</button>
          <button class="chip" data-query="What payment methods do you accept?">💳 Payment methods</button>
          <button class="chip" data-query="How do I install the desktop application?">💻 Install app</button>
          <button class="chip" data-query="Is my personal data secure?">🔒 Data security</button>
          <button class="chip" data-query="How do I contact customer support?">🎧 Contact support</button>
          <button class="chip" data-query="Do you offer a free trial?">🎁 Free trial</button>
        </div>
      </div>
    </div>

    <!-- ── Message Window ── -->
    <div class="chat-window" id="chatWindow" role="log" aria-live="polite" aria-label="Conversation history">
    </div>

    <!-- ── Input Area ── -->
    <div class="input-area">
      <div class="input-bar">
        <!-- Voice Input Button -->
        <button class="voice-btn" id="voiceBtn" aria-label="Voice input" title="Speak your question">
          🎤
        </button>

        <textarea
          id="userInput"
          class="user-input"
          placeholder="Ask me anything about our software…"
          rows="1"
          aria-label="Type your question here"
          maxlength="500"
        ></textarea>

        <button class="send-btn" id="sendBtn" aria-label="Send message" title="Send">
          <span class="send-icon">➤</span>
        </button>
      </div>
      <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line · <span id="charCount">0</span>/500</p>
    </div>

  </main>
</div><!-- /.app-shell -->

<!-- ===== TOAST NOTIFICATION ===== -->
<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
